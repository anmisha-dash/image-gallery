<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1 class="heading">Photo Gallery</h1>
    <p class="subheading">A collection of nature shots</p>

    <div class="gallery">

      <div class="card">
        <div class="img mountains"></div>
        <div class="overlay">
          <span class="label">Mountains</span>
        </div>
      </div>

      <div class="card">
        <div class="img ocean"></div>
        <div class="overlay">
          <span class="label">Ocean</span>
        </div>
      </div>

      <div class="card">
        <div class="img forest"></div>
        <div class="overlay">
          <span class="label">Forest</span>
        </div>
      </div>

      <div class="card">
        <div class="img desert"></div>
        <div class="overlay">
          <span class="label">Desert</span>
        </div>
      </div>

      <div class="card">
        <div class="img city"></div>
        <div class="overlay">
          <span class="label">City</span>
        </div>
      </div>

      <div class="card">
        <div class="img sunset"></div>
        <div class="overlay">
          <span class="label">Sunset</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
